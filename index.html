<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALTARA | Satellite Biomechanic Mapping</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Share+Tech+Mono&family=Lato:wght@300;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --valtara-oro: #D4AF37;
            --valtara-cian: #00ffff;
            --valtara-negro: #050508;
            --font-tech: 'Share Tech Mono', monospace;
            --font-accent: 'Playfair Display', serif;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: var(--valtara-negro); color: white; 
            font-family: 'Lato', sans-serif; overflow: hidden; touch-action: none;
        }

        /* --- HUD SOBERANO (Estilo Satelital) --- */
        #hud-container {
            position: absolute; inset: 0; pointer-events: none; z-index: 100;
            padding: 30px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .header-box { display: flex; justify-content: space-between; align-items: flex-start; }
        .brand-title { font-family: var(--font-accent); font-size: 2.5rem; color: var(--valtara-oro); letter-spacing: 5px; margin: 0; text-shadow: 0 0 20px rgba(212,175,55,0.3); }
        .system-status { font-family: var(--font-tech); font-size: 0.75rem; color: var(--valtara-cian); text-align: right; line-height: 1.6; }

        /* --- TELEMETRÍA XYZ (Triangulación) --- */
        #telemetry {
            background: rgba(0, 255, 255, 0.05); border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 15px; border-radius: 10px; font-family: var(--font-tech); width: 220px;
            color: var(--valtara-cian); font-size: 0.8rem; pointer-events: auto;
        }
        .coord-line { display: flex; justify-content: space-between; margin-bottom: 5px; }

        /* --- TARJETA CLÍNICA DE CRISTAL --- */
        #clinical-info {
            position: absolute; top: 50%; right: -500px; transform: translateY(-50%);
            width: 350px; background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(30px);
            border: 1px solid var(--valtara-oro); border-radius: 25px; padding: 35px;
            z-index: 200; box-shadow: -20px 0 50px rgba(0,0,0,0.8);
            transition: right 0.8s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: auto;
        }
        #clinical-info.active { right: 40px; }
        .zone-header { border-bottom: 2px solid var(--valtara-oro); padding-bottom: 15px; margin-bottom: 20px; }
        .zone-title { font-family: var(--font-accent); font-size: 2rem; color: white; margin: 0; }
        .zone-desc { font-size: 1rem; color: #aaa; line-height: 1.7; font-weight: 300; }
        
        .btn-reset {
            margin-top: 25px; background: var(--valtara-oro); border: none; color: black;
            padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }

        /* --- PANTALLA DE CARGA --- */
        #loader {
            position: fixed; inset: 0; background: var(--valtara-negro);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 1s;
        }
        .scan-line {
            width: 300px; height: 2px; background: var(--valtara-cian);
            box-shadow: 0 0 15px var(--valtara-cian); animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { transform: translateY(-50px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(50px); opacity: 0; } }

        /* --- RADAR --- */
        #radar {
            position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px;
            border: 1px solid rgba(0,255,255,0.2); border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,255,0.1) 0%, transparent 70%);
        }
        .radar-sweep {
            width: 100%; height: 100%; border-radius: 50%;
            border-top: 2px solid var(--valtara-cian); animation: rotate 3s linear infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="loader">
        <div class="scan-line"></div>
        <p style="color:var(--valtara-oro); font-family:var(--font-tech); margin-top:20px; letter-spacing:5px;">TRIANGULANDO OBJETO...</p>
    </div>

    <div id="hud-container">
        <div class="header-box">
            <div>
                <h1 class="brand-title">VALTARA</h1>
                <p style="color:#888; font-size:0.7rem; letter-spacing:4px; margin-top:5px; font-weight:900; text-transform:uppercase;">Global Biomechanic Satellite</p>
            </div>
            <div class="system-status">
                LAT: 19.4326° N<br>
                LONG: 99.1332° W<br>
                ALT: 2240m [CDMX]<br>
                <span style="color:#00ff00;">SAT_LINK: ESTABLE</span>
            </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div id="radar"><div class="radar-sweep"></div></div>
            <div id="telemetry">
                <div style="border-bottom:1px solid rgba(0,255,255,0.3); margin-bottom:10px; padding-bottom:5px;">SATELLITE TELEMETRY</div>
                <div class="coord-line"><span>AXIS_X:</span> <span id="pos-x">0.00</span></div>
                <div class="coord-line"><span>AXIS_Y:</span> <span id="pos-y">0.00</span></div>
                <div class="coord-line"><span>AXIS_Z:</span> <span id="pos-z">0.00</span></div>
                <div class="coord-line" style="margin-top:10px; color:white;"><span>ZOOM_LVL:</span> <span id="zoom-val">1.0x</span></div>
            </div>
        </div>
    </div>

    <div id="clinical-info">
        <div class="zone-header">
            <h2 id="zone-name">ZONA</h2>
        </div>
        <p id="zone-desc">Detectando anomalía muscular...</p>
        <button class="btn-reset" onclick="resetView()">Reiniciar Satélite</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 1. CONFIGURACIÓN DEL ESPACIO ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);
        scene.fog = new THREE.Fog(0x050508, 1, 15);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1, 0);

        // --- 2. ILUMINACIÓN SATELITAL ---
        const amb = new THREE.AmbientLight(0xffffff, 0.5); scene.add(amb);
        const goldS = new THREE.SpotLight(0xD4AF37, 50); goldS.position.set(5, 5, 5); scene.add(goldS);
        const cyanP = new THREE.PointLight(0x00ffff, 20); cyanP.position.set(-5, 2, 2); scene.add(cyanP);
        
        // Rim Light (Luz trasera para definir silueta)
        const rim = new THREE.DirectionalLight(0xffffff, 2);
        rim.position.set(0, 0, -5);
        scene.add(rim);

        // --- 3. DATOS DE TRIANGULACIÓN (6 NODOS) ---
        const nodosData = [
            { id: "head", name: "Cráneo / Cervical", desc: "Estrés tensional agudo. Riesgo de migraña tensional por postura.", pos: [0, 1.7, 0.05], zoom: [0, 1.7, 1.2] },
            { id: "sho_r", name: "Hombro Derecho", desc: "Contracción escapular severa. Sobrecarga del manguito rotador.", pos: [-0.35, 1.45, 0], zoom: [-0.6, 1.45, 1.5] },
            { id: "sho_l", name: "Hombro Izquierdo", desc: "Punto de gatillo activo. Inflamación por carga asimétrica.", pos: [0.35, 1.45, 0], zoom: [0.6, 1.45, 1.5] },
            { id: "lumbar", name: "Zona Lumbar L4-L5", desc: "Compresión discal reportada. Requiere descompresión vertebral profunda.", pos: [0, 0.9, -0.05], zoom: [0, 0.9, 1.8] },
            { id: "wrist_r", name: "Túnel Carpiano (R)", desc: "Inflamación tendinosa por uso de ratón periférico y dispositivos móviles.", pos: [-0.65, 0.75, 0.15], zoom: [-1.2, 0.75, 1.5] },
            { id: "knee_l", name: "Rodilla Izquierda", desc: "Tensión en ligamentos colaterales. Desgaste articular biomecánico.", pos: [0.18, 0.45, 0.1], zoom: [0.5, 0.45, 1.8] }
        ];

        const interactivos = [];
        const geoNode = new THREE.SphereGeometry(0.05, 16, 16);
        const matNode = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.5 });

        nodosData.forEach(n => {
            const s = new THREE.Mesh(geoNode, matNode.clone());
            s.position.set(n.pos[0], n.pos[1], n.pos[2]);
            s.userData = n;
            scene.add(s);
            interactivos.push(s);
        });

        // --- 4. CARGA DEL AVATAR (FIBRA DE CARBONO) ---
        const loader = new GLTFLoader();
        loader.load("https://raw.githubusercontent.com/valtara-executive/render-3d/main/Character%20Base.glb", (gltf) => {
            const model = gltf.scene;
            const mat = new THREE.MeshPhongMaterial({ 
                color: 0x111111, specular: 0xD4AF37, shininess: 100, 
                transparent: true, opacity: 0.9, emissive: 0x050505 
            });
            model.traverse(c => { if(c.isMesh) c.material = mat; });
            model.position.y = -0.1; // Alineación con esferas
            scene.add(model);
            
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 1000);
        });

        // --- 5. LÓGICA DE TRIANGULACIÓN TÁCTIL ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        window.addEventListener('pointerdown', (e) => {
            pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects(interactivos);

            if (intersects.length > 0) {
                focusNode(intersects[0].object);
            }
        });

        let currentActive = null;
        function focusNode(nodo) {
            if(currentActive) currentActive.material.color.setHex(0x00ffff);
            nodo.material.color.setHex(0xff5555);
            currentActive = nodo;

            const d = nodo.userData;
            document.getElementById('zone-name').innerText = d.name;
            document.getElementById('zone-desc').innerText = d.desc;
            document.getElementById('clinical-info').classList.add('active');

            // Vuelo de Cámara GSAP
            gsap.to(camera.position, { x: d.zoom[0], y: d.zoom[1], z: d.zoom[2], duration: 2, ease: "expo.inOut" });
            gsap.to(controls.target, { x: d.pos[0], y: d.pos[1], z: d.pos[2], duration: 2, ease: "expo.inOut" });
        }

        window.resetView = () => {
            document.getElementById('clinical-info').classList.remove('active');
            if(currentActive) currentActive.material.color.setHex(0x00ffff);
            currentActive = null;
            gsap.to(camera.position, { x: 0, y: 1.5, z: 6, duration: 2, ease: "expo.inOut" });
            gsap.to(controls.target, { x: 0, y: 1, z: 0, duration: 2, ease: "expo.inOut" });
        };

        // --- 6. RENDER LOOP & TELEMETRÍA ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Actualizar Telemetría XYZ en tiempo real
            document.getElementById('pos-x').innerText = camera.position.x.toFixed(2);
            document.getElementById('pos-y').innerText = camera.position.y.toFixed(2);
            document.getElementById('pos-z').innerText = camera.position.z.toFixed(2);
            const dist = camera.position.distanceTo(new THREE.Vector3(0,1,0));
            document.getElementById('zoom-val').innerText = (10 / dist).toFixed(1) + "x";

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
