<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALTARA | Auto-Escáner Satelital 3D</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Share+Tech+Mono&family=Lato:wght@300;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --valtara-oro: #D4AF37;
            --valtara-cian: #00ffff;
            --valtara-negro: #050508;
            --valtara-alerta: #ff5555;
            --font-tech: 'Share Tech Mono', monospace;
            --font-accent: 'Playfair Display', serif;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--valtara-negro); color: white; font-family: 'Lato', sans-serif; overflow: hidden; touch-action: none; }

        /* --- HUD PRINCIPAL --- */
        #hud-container { position: absolute; inset: 0; pointer-events: none; z-index: 100; padding: 30px; display: flex; flex-direction: column; justify-content: space-between; }
        .header-box { display: flex; justify-content: space-between; align-items: flex-start; }
        .brand-title { font-family: var(--font-accent); font-size: 2.5rem; color: var(--valtara-oro); margin: 0; letter-spacing: 5px; text-shadow: 0 0 20px rgba(212,175,55,0.2); }
        .system-status { font-family: var(--font-tech); font-size: 0.8rem; color: var(--valtara-cian); text-align: right; line-height: 1.6; background: rgba(0,255,255,0.05); padding: 10px; border: 1px solid rgba(0,255,255,0.2); border-radius: 8px; }

        /* --- CONTROLES Y TELEMETRÍA --- */
        .bottom-console { display: flex; justify-content: space-between; align-items: flex-end; pointer-events: auto; }
        
        .btn-auto-scan {
            background: rgba(0, 255, 255, 0.1); border: 1px solid var(--valtara-cian); color: var(--valtara-cian);
            padding: 15px 30px; border-radius: 50px; font-family: var(--font-tech); font-size: 1rem;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px rgba(0,255,255,0.2); display: flex; align-items: center; gap: 10px;
        }
        .btn-auto-scan:hover { background: var(--valtara-cian); color: black; box-shadow: 0 0 30px rgba(0,255,255,0.5); }
        .btn-auto-scan.scanning { background: var(--valtara-alerta); border-color: var(--valtara-alerta); color: white; box-shadow: 0 0 30px rgba(255,85,85,0.5); }

        #telemetry { background: rgba(0, 0, 0, 0.7); border-left: 2px solid var(--valtara-oro); padding: 15px; font-family: var(--font-tech); width: 200px; color: #aaa; font-size: 0.8rem; backdrop-filter: blur(10px); }
        .coord-line span:last-child { color: white; float: right; }

        /* --- TARJETA CLÍNICA --- */
        #clinical-info {
            position: absolute; top: 50%; right: -500px; transform: translateY(-50%); width: 340px; 
            background: linear-gradient(135deg, rgba(15,15,20,0.95), rgba(5,5,8,0.95)); backdrop-filter: blur(20px);
            border: 1px solid rgba(242, 201, 76, 0.4); border-radius: 20px; padding: 30px; z-index: 200; 
            box-shadow: -15px 0 40px rgba(0,0,0,0.9); transition: right 0.6s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: auto;
        }
        #clinical-info.active { right: 30px; }
        .zone-title { font-family: var(--font-accent); font-size: 1.8rem; color: white; margin: 0 0 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .zone-desc { font-size: 1rem; color: #ccc; line-height: 1.6; font-weight: 300; }
        .btn-reset { margin-top: 20px; background: transparent; border: 1px solid var(--valtara-oro); color: var(--valtara-oro); padding: 12px; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-reset:hover { background: var(--valtara-oro); color: black; }

        /* --- PANTALLA CARGA --- */
        #loader { position: fixed; inset: 0; background: var(--valtara-negro); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.8s; }
        .loader-ring { width: 60px; height: 60px; border: 2px solid #222; border-top: 2px solid var(--valtara-oro); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="loader">
        <div class="loader-ring"></div>
        <div id="loader-text" style="color:var(--valtara-oro); font-family:var(--font-tech); letter-spacing:3px;">INICIANDO NÚCLEO 3D...</div>
    </div>

    <div id="hud-container">
        <div class="header-box">
            <div>
                <h1 class="brand-title">VALTARA</h1>
                <p style="color:#888; font-size:0.7rem; letter-spacing:4px; margin-top:5px;">Sovereign OS | Scanner Room</p>
            </div>
            <div class="system-status">
                SEC_LINK: AES-256<br>
                GRAVITY: 9.8 m/s²<br>
                <span style="color:#00ff00;">READY FOR DIAGNOSIS</span>
            </div>
        </div>

        <div class="bottom-console">
            <button class="btn-auto-scan" id="btn-auto-scan" onclick="toggleAutoScan()">
                <i class="fa-solid fa-radar" id="scan-icon"></i> <span id="scan-text">INICIAR AUTO-ESCÁNER</span>
            </button>
            <div id="telemetry">
                <div style="color:var(--valtara-oro); margin-bottom:8px; font-weight:bold;">COORDENADAS EN VIVO</div>
                <div class="coord-line">X: <span id="pos-x">0.00</span></div>
                <div class="coord-line">Y: <span id="pos-y">0.00</span></div>
                <div class="coord-line">Z: <span id="pos-z">0.00</span></div>
            </div>
        </div>
    </div>

    <div id="clinical-info">
        <h2 class="zone-title" id="zone-name">ZONA</h2>
        <p class="zone-desc" id="zone-desc">Diagnóstico...</p>
        <button class="btn-reset" onclick="resetView()">LIBERAR CÁMARA</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 1. SETUP DEL MOTOR ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.3, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.target.set(0, 0.8, 0);

        // --- 2. ILUMINACIÓN PREMIUM ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const lightG = new THREE.SpotLight(0xD4AF37, 40); lightG.position.set(4, 5, 4); scene.add(lightG);
        const lightC = new THREE.SpotLight(0x00ffff, 30); lightC.position.set(-4, 3, 3); scene.add(lightC);
        const rimL = new THREE.DirectionalLight(0xffffff, 2); rimL.position.set(0, 0, -6); scene.add(rimL);

        // --- 3. DICCIONARIO CLÍNICO (10 NODOS) ---
        const nodosData = [
            { id: "cabeza", name: "Cráneo / Cervical", desc: "Tensión acumulada por concentración prolongada. Riesgo de migraña tensional.", pos: [0, 1.7, 0.05], zoom: [0, 1.7, 1.2] },
            { id: "hombro_d", name: "Hombro Derecho", desc: "Sobrecarga en deltoides y manguito rotador. Uso intensivo de mouse.", pos: [-0.35, 1.45, 0], zoom: [-0.6, 1.45, 1.5] },
            { id: "hombro_i", name: "Hombro Izquierdo", desc: "Rigidez escapular. Compensación por postura asimétrica en escritorio.", pos: [0.35, 1.45, 0], zoom: [0.6, 1.45, 1.5] },
            { id: "codo_d", name: "Codo Derecho", desc: "Epicondilitis (Codo de tenista) incipiente por micromovimientos de teclado.", pos: [-0.5, 1.1, 0.05], zoom: [-0.8, 1.1, 1.2] },
            { id: "muneca_d", name: "Muñeca Derecha", desc: "Inflamación del Túnel Carpiano. Requiere liberación miofascial urgente.", pos: [-0.65, 0.75, 0.15], zoom: [-1.0, 0.75, 1.2] },
            { id: "espalda_m", name: "Espalda Media", desc: "Cifosis postural. Debilidad en romboides por pasar horas frente al monitor.", pos: [0, 1.2, -0.15], zoom: [0, 1.2, -1.8] }, // Zoom por detrás
            { id: "lumbar", name: "Lumbares L4-L5", desc: "Alta presión discal por sedentarismo. Origen primario de dolor ejecutivo.", pos: [0, 0.9, -0.1], zoom: [0, 0.9, 1.8] },
            { id: "gluteo", name: "Nervio Ciático", desc: "Compresión del nervio por el músculo piramidal (Síndrome del oficinista).", pos: [0.2, 0.75, -0.15], zoom: [0.5, 0.75, -1.5] },
            { id: "rodilla", name: "Rodillas", desc: "Tensión en ligamentos por flexión prolongada a 90 grados en la silla.", pos: [0.18, 0.45, 0.1], zoom: [0.5, 0.45, 1.5] },
            { id: "pies", name: "Fascitis Plantar", desc: "Pobre retorno venoso y acortamiento del tendón de Aquiles por falta de marcha.", pos: [0, 0.05, 0.1], zoom: [0, 0.05, 1.2] }
        ];

        const interactivos = [];
        const geoNode = new THREE.SphereGeometry(0.04, 16, 16);
        const matNode = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6 });

        nodosData.forEach(n => {
            const s = new THREE.Mesh(geoNode, matNode.clone());
            s.position.set(n.pos[0], n.pos[1], n.pos[2]);
            s.userData = n;
            scene.add(s);
            interactivos.push(s);
        });

        // --- 4. CARGA DEL AVATAR ---
        const loader = new GLTFLoader();
        loader.load("https://raw.githubusercontent.com/valtara-executive/render-3d/main/Character%20Base.glb", (gltf) => {
            const model = gltf.scene;
            const mat = new THREE.MeshPhongMaterial({ color: 0x111111, specular: 0xD4AF37, shininess: 120, transparent: true, opacity: 0.95 });
            model.traverse(c => { if(c.isMesh) c.material = mat; });
            model.position.y = -0.1;
            scene.add(model);
            
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 800);
        });

        // --- 5. SISTEMA LÁSER (INTERACTIVIDAD) ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        let currentActive = null;
        let isAutoScanning = false;
        let scanTimeline = null;

        window.addEventListener('pointerdown', (e) => {
            if(isAutoScanning) return; // Si está en auto-scan, bloquea el toque manual
            pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects(interactivos);
            if (intersects.length > 0) focusNode(intersects[0].object);
        });

        function focusNode(nodo, speed = 1.5) {
            if(currentActive) currentActive.material.color.setHex(0x00ffff);
            nodo.material.color.setHex(0xff5555);
            currentActive = nodo;

            const d = nodo.userData;
            document.getElementById('zone-name').innerText = d.name;
            document.getElementById('zone-desc').innerText = d.desc;
            document.getElementById('clinical-info').classList.add('active');

            gsap.to(camera.position, { x: d.zoom[0], y: d.zoom[1], z: d.zoom[2], duration: speed, ease: "power2.inOut" });
            gsap.to(controls.target, { x: d.pos[0], y: d.pos[1], z: d.pos[2], duration: speed, ease: "power2.inOut" });
        }

        window.resetView = () => {
            if(isAutoScanning) window.toggleAutoScan(); // Detiene el escáner si estaba activo
            document.getElementById('clinical-info').classList.remove('active');
            if(currentActive) currentActive.material.color.setHex(0x00ffff);
            currentActive = null;
            gsap.to(camera.position, { x: 0, y: 1.3, z: 6, duration: 1.5, ease: "power2.inOut" });
            gsap.to(controls.target, { x: 0, y: 0.8, z: 0, duration: 1.5, ease: "power2.inOut" });
        };

        // --- 6. AUTO-ESCÁNER INTELIGENTE ---
        window.toggleAutoScan = () => {
            const btn = document.getElementById('btn-auto-scan');
            const icon = document.getElementById('scan-icon');
            const text = document.getElementById('scan-text');

            if(!isAutoScanning) {
                // Iniciar Escáner
                isAutoScanning = true;
                btn.classList.add('scanning');
                icon.className = "fa-solid fa-stop";
                text.innerText = "DETENER ESCÁNER";
                
                scanTimeline = gsap.timeline({ repeat: -1 }); // Loop infinito
                
                interactivos.forEach((nodo) => {
                    scanTimeline.call(() => focusNode(nodo, 2))
                                .to({}, { duration: 4 }); // Espera 4 segundos en cada nodo para leer
                });
            } else {
                // Detener Escáner
                isAutoScanning = false;
                if(scanTimeline) scanTimeline.kill();
                btn.classList.remove('scanning');
                icon.className = "fa-solid fa-radar";
                text.innerText = "INICIAR AUTO-ESCÁNER";
                window.resetView();
            }
        };

        // --- 7. BUCLE DE RENDERIZADO ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            // Actualizar telemetría en el HUD
            document.getElementById('pos-x').innerText = camera.position.x.toFixed(2);
            document.getElementById('pos-y').innerText = camera.position.y.toFixed(2);
            document.getElementById('pos-z').innerText = camera.position.z.toFixed(2);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
