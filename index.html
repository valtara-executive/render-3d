<script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. CREACIÓN DEL UNIVERSO
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);
        scene.fog = new THREE.FogExp2(0x050508, 0.05);

        // 2. EL OJO DEL PACIENTE
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 5); 

        // 3. EL MOTOR DE RENDERIZADO
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 4. SISTEMA DE ILUMINACIÓN POTENCIADO
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); // Luz base más fuerte
        scene.add(ambientLight);

        // Foco de Luz Oro (Izquierda) - Ultra potente
        const spotLightGold = new THREE.SpotLight(0xD4AF37, 50);
        spotLightGold.position.set(5, 5, 2);
        spotLightGold.angle = Math.PI / 3;
        spotLightGold.penumbra = 0.5;
        scene.add(spotLightGold);

        // Foco de Luz Cian (Derecha) - Ultra potente
        const spotLightCyan = new THREE.SpotLight(0x00ffff, 40);
        spotLightCyan.position.set(-5, 3, 5);
        spotLightCyan.angle = Math.PI / 3;
        spotLightCyan.penumbra = 0.5;
        scene.add(spotLightCyan);

        // Luz Frontal directa para iluminar el pecho
        const frontLight = new THREE.DirectionalLight(0xffffff, 2);
        frontLight.position.set(0, 2, 5);
        scene.add(frontLight);

        // 5. CONTROLES TÁCTILES
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 1;
        controls.maxDistance = 10;
        controls.target.set(0, 1, 0);

        // 6. INYECCIÓN DEL MODELO Y MATERIAL
        const modelUrl = "https://raw.githubusercontent.com/valtara-executive/render-3d/main/Character%20Base.glb";
        const loader = new GLTFLoader();
        const loadingText = document.getElementById('loader');

        loader.load(
            modelUrl,
            (gltf) => {
                const model = gltf.scene;
                model.position.set(0, -1, 0); 
                
                // LA ALQUIMIA REPARADA: Piel de Obsidiana con brillo de Oro
                const valtaraMaterial = new THREE.MeshPhongMaterial({
                    color: 0x111111,       // Base oscura elegante
                    specular: 0xD4AF37,    // El reflejo de la luz será color Oro Valtara
                    shininess: 100,        // Muy pulido (como cristal oscuro o cerámica)
                    emissive: 0x050505,    // Un brillo propio súper sutil para que no sea negro total
                    transparent: true,     
                    opacity: 0.95          // Ligerísima transparencia de holograma
                });

                // Aplicar el material a todo el modelo
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.material = valtaraMaterial;
                    }
                });

                scene.add(model);
                loadingText.style.display = 'none';

                // Ajuste inteligente de cámara
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                controls.target.copy(center);
                camera.position.set(center.x, center.y, size.y * 1.8);
            },
            (xhr) => {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                loadingText.innerText = `Sincronizando Malla: ${percent}%`;
            },
            (error) => {
                console.error('Fallo:', error);
                loadingText.innerText = "Error de carga.";
            }
        );

        // 7. LOOP DE ANIMACIÓN
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 8. DISEÑO RESPONSIVO
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
</script>
